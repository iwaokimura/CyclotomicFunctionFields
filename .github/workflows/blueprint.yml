name: Build and deploy blueprint

on:
  push:
    branches:
      - master
      - issue-1-blueprint
  workflow_dispatch:

# Allow one concurrent deployment
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_blueprint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install graphviz and TeX infrastructure
        run: sudo apt-get install -y graphviz libgraphviz-dev texlive-base

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python dependencies
        run: uv sync

      - name: Build blueprint
        run: |
          cd "$GITHUB_WORKSPACE/blueprint/src"
          rm -f web.paux
          "$GITHUB_WORKSPACE/.venv/bin/plastex" -c plastex.cfg web.tex

      - name: Upload blueprint artifact
        uses: actions/upload-artifact@v4
        with:
          name: blueprint-web
          path: blueprint/web

  build_docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Get mathlib cache
        run: lake exe cache get

      - name: Build Lean docs
        run: lake -R -Kenv=dev docs

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: lean-docs
          path: .lake/build/doc

  deploy:
    needs: [build_blueprint, build_docs]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download blueprint
        uses: actions/download-artifact@v4
        with:
          name: blueprint-web
          path: _site

      - name: Download Lean docs
        uses: actions/download-artifact@v4
        with:
          name: lean-docs
          path: _site/docs

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

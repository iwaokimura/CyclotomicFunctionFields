name: Build and deploy blueprint

on:
  push:
    branches:
      - master
      - fix/ci-api-docs-failure
  workflow_dispatch:

# Allow one concurrent deployment
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore Lake build cache
        uses: actions/cache/restore@v4
        with:
          path: .lake/build
          key: lake-build-${{ runner.os }}-${{ hashFiles('lake-manifest.json') }}
          restore-keys: lake-build-${{ runner.os }}-

      - name: Build and lint the project
        uses: leanprover/lean-action@v1

      - name: Build documentation and blueprint
        uses: leanprover-community/docgen-action@main
        with:
          blueprint: true
          api-docs: false
          references: blueprint/src/references.bib
          deploy: false

      - name: Add root index.html
        if: github.ref == 'refs/heads/master'
        run: |
          cat > docs/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; URL=blueprint/">
            <title>CyclotomicFunctionFields</title>
          </head>
          <body><p>Redirecting to <a href="blueprint/">Blueprint</a>…</p></body>
          </html>
          EOF

      - name: Upload pages artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/master'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Save Lake build cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: .lake/build
          key: lake-build-${{ runner.os }}-${{ hashFiles('lake-manifest.json') }}

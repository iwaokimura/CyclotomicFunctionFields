name: Build and deploy blueprint

on:
  push:
    branches:
      - master
      - issue-1-blueprint

# Allow one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build_blueprint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install graphviz
        run: sudo apt-get install -y graphviz libgraphviz-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python dependencies
        run: uv sync

      - name: Debug kpsewhich
        run: |
          cd "$GITHUB_WORKSPACE/blueprint/src"
          echo "=== kpsewhich location ==="
          which kpsewhich || echo "kpsewhich not found"
          echo "=== searching macros/common ==="
          kpsewhich macros/common || true
          echo "=== searching with TEXINPUTS ==="
          TEXINPUTS=".:./macros:" kpsewhich macros/common || true
          TEXINPUTS=".:./macros:" kpsewhich common || true
          echo "=== python os.path check ==="
          python3 -c "import os; print(os.getcwd()); print(os.path.isfile('macros/common.tex')); print(os.listdir('macros'))"

      - name: Build blueprint
        run: |
          cd "$GITHUB_WORKSPACE/blueprint/src"
          rm -f web.paux
          "$GITHUB_WORKSPACE/.venv/bin/plastex" -c plastex.cfg web.tex

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: blueprint/web

  deploy:
    needs: build_blueprint
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
